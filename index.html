<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Group-D ToDo App — a simple, elegant task manager." />
  <title>ToDo App — Group D</title>

  <!-- Google Fonts — Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <main class="app">
    <div class="card">

      <!-- App Header -->
      <h1 class="app-title">📝 ToDo</h1>

      <!-- === TASK CREATION SECTION (Developer A) === -->
      <div class="input-wrapper">
        <input
          type="text"
          id="task-input"
          placeholder="What needs to be done?"
          aria-label="New task description"
          autocomplete="off"
        />
        <button id="add-btn" aria-label="Add task">Add</button>
      </div>
      <!-- === END TASK CREATION SECTION === -->

      <!-- Task List -->
      <ul id="task-list" class="task-list" aria-label="Task list">
        <!-- Task items are rendered here by app.js -->
      </ul>

      <!-- Empty State -->
      <p id="empty-state" class="empty-state">No tasks yet — add one above!</p>

    </div>
  </main>

  <!-- Scripts (ES6 modules) -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
